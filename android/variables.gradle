ext {
    // 注意：kotlinVersion 必须与 build.gradle 顶部 buildscript ext.kotlinVersion 保持一致。
    // buildscript block 里的 ext 仅在 buildscript 作用域可见，子项目实际用的是这里。
    // Dependabot 升级 Kotlin 时只改 build.gradle 不会改本文件 —— 需手动同步。
    kotlinVersion = '2.4.10'
    minSdkVersion = 24
    compileSdkVersion = 36
    targetSdkVersion = 36

    // Compose
    composeBomVersion = '2025.07.00'

    // AndroidX
    androidxActivityVersion = '1.10.1'
    androidxAppCompatVersion = '1.7.0'
    androidxCoordinatorLayoutVersion = '1.2.0'
    androidxCoreVersion = '1.12.0'
    androidxFragmentVersion = '1.6.2'
    coreSplashScreenVersion = '1.0.1'
    navigationComposeVersion = '2.9.2'
    lifecycleVersion = '2.9.2'

    // Data
    roomVersion = '2.7.2'
    datastoreVersion = '1.1.7'
    gsonVersion = '2.10.1'

    // Network
    ktorVersion = '3.2.3'

    // Crash Reporting
    sentryVersion = '8.42.0'

    // Test
    junitVersion = '4.13.2'
    androidxJunitVersion = '1.1.5'
    androidxEspressoCoreVersion = '3.5.1'
}
