# Detekt configuration for Agent Control Center
# https://detekt.dev/docs/introduction

complexity:
  active: true
  LongMethod:
    threshold: 80
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 10
  ComplexCondition:
    threshold: 5
  CyclomaticComplexMethod:
    threshold: 20
  TooManyFunctions:
    thresholdInFiles: 15
    thresholdInClasses: 15
  LargeClass:
    threshold: 200

style:
  active: true
  WildcardImport:
    active: false  # Compose heavily uses wildcard imports
  ReturnCount:
    active: false  # Early returns are idiomatic in Kotlin
  # M-19: MagicNumber 检查暂时保持禁用。
  # 审查时计划启用以捕获散落的硬编码常量，但代码库现有 207 处魔法数
  # （多为 Compose 字号 / 颜色 ARGB / padding，需逐一抽取为命名常量）。
  # 启用前需先重构存量或重新生成 detekt-baseline.xml 接受存量，
  # 否则 CI 会被现有违规阻断。SwallowedException 已启用。
  # TODO: 重构存量魔法数后重新启用，或运行
  #   ./gradlew detektBaseline 生成 baseline 后启用。
  MagicNumber:
    active: false
  ForbiddenComment:
    active: false  # TODO/FIXME are useful for tracking

naming:
  active: true
  FunctionNaming:
    functionPattern: '([a-z][a-zA-Z0-9]*)|(`.*`)'
  VariableNaming:
    variablePattern: '([a-z][a-zA-Z0-9]*)|(`.*`)'

empty-blocks:
  active: true
  EmptyFunctionBlock:
    active: false  # Overrides often need empty bodies

exceptions:
  active: true
  # M-19: 启用 SwallowedException 检查，禁止 `catch (_: Exception) {}` 这种
  # 无日志无注释的吞错。已有的有意吞错点必须保留注释说明（如 // ignore CancellationException
  # 不应在此处吞掉），新代码应优先 catch 具体异常类型或在 catch 块中至少打日志。
  # 对于 transport / 协议解析层确需 catch-all 的位置，使用
  # `@Suppress("SwallowedException")` 局部豁免并保留说明注释。
  SwallowedException:
    active: true
    # detekt SwallowedException 仅支持 ignoredExceptionTypes 一个配置项；
    # 不强制要求命名的选项不存在，依赖 catch 块非空或带注释即可。
    # 常见非异常性 catch（如 InterruptedException）在此豁免。
    ignoredExceptionTypes: ['InterruptedException', 'MalformedURLException', 'NumberFormatException', 'ParseException', 'CancellationException']
