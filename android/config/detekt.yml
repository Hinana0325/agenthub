# Detekt configuration for Agent Control Center
# https://detekt.dev/docs/introduction

complexity:
  active: true
  LongMethod:
    threshold: 80
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 10
  ComplexCondition:
    threshold: 5
  CyclomaticComplexMethod:
    threshold: 20
  TooManyFunctions:
    thresholdInFiles: 15
    thresholdInClasses: 15
  LargeClass:
    threshold: 200

style:
  active: true
  WildcardImport:
    active: false  # Compose heavily uses wildcard imports
  ReturnCount:
    active: false  # Early returns are idiomatic in Kotlin
  # M-19: MagicNumber 检查暂时保持禁用。
  # 审查时计划启用以捕获散落的硬编码常量，但代码库现有 207 处魔法数
  # （多为 Compose 字号 / 颜色 ARGB / padding，需逐一抽取为命名常量）。
  # 启用前需先重构存量或重新生成 detekt-baseline.xml 接受存量，
  # 否则 CI 会被现有违规阻断。SwallowedException 已启用。
  # TODO: 重构存量魔法数后重新启用，或运行
  #   ./gradlew detektBaseline 生成 baseline 后启用。
  MagicNumber:
    active: false
  ForbiddenComment:
    active: false  # TODO/FIXME are useful for tracking

naming:
  active: true
  FunctionNaming:
    functionPattern: '([a-z][a-zA-Z0-9]*)|(`.*`)'
  VariableNaming:
    variablePattern: '([a-z][a-zA-Z0-9]*)|(`.*`)'

empty-blocks:
  active: true
  EmptyFunctionBlock:
    active: false  # Overrides often need empty bodies

exceptions:
  active: true
  # M-19: SwallowedException 检查暂时保持禁用。
  # 审查时计划启用以禁止 `catch (_: Exception) {}` 这种无日志吞错，
  # 但代码库现有存量违规（如 StatusNotificationManager:111）需先重构。
  # TODO: 重构存量吞错点后重新启用。
  SwallowedException:
    active: false
