name: AgentControlCenter
options:
  bundleIdPrefix: com.agentcontrolcenter.app
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: zh-Hans
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: minimal
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: YES

packages:
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: 8.0.0

targets:
  AgentControlCenter:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AgentControlCenter
        excludes:
          - Info.plist
          - Resources
          - Widget
    resources:
      - path: AgentControlCenter/Resources/Assets.xcassets
    dependencies:
      - package: Sentry
    info:
      path: AgentControlCenter/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentcontrolcenter.app.ios
        PRODUCT_NAME: AgentControlCenter
        MARKETING_VERSION: "3.0.0"
        CURRENT_PROJECT_VERSION: "27"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"

schemes:
  AgentControlCenter:
    build:
      targets:
        AgentControlCenter: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
