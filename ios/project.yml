name: AgentControlCenter
options:
  bundleIdPrefix: com.agentcontrolcenter.app
  deploymentTarget:
    iOS: "18.0"
  developmentLanguage: zh-Hans
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    # Sentry DSN 通过 xcconfig 风格变量注入到 Info.plist；
    # 本地构建未设置时 Info.plist 中保留 $(SENTRY_DSN) 占位，App 启动时会跳过 Sentry 上报。
    SENTRY_DSN: "$(SENTRY_DSN)"

packages:
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: 8.0.0

targets:
  AgentControlCenter:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: AgentControlCenter
        excludes:
          - Info.plist
          - Resources
          - Widget
    resources:
      - path: AgentControlCenter/Resources/Assets.xcassets
    # C4 修复：原文件存在两个 `dependencies:` 键（YAML 重复键），
    # Yams 解析器会用后者覆盖前者，导致 Sentry SPM 依赖丢失、import Sentry 编译失败。
    # 合并为单个 dependencies 列表，同时声明 SPM 包依赖与 target 依赖。
    dependencies:
      - package: Sentry
      - target: AgentControlCenterWidgetExtension
    info:
      path: AgentControlCenter/Info.plist
      properties:
        SENTRY_DSN: $(SENTRY_DSN)
        # F27 修复：声明 URL Scheme，让系统把 agentcontrolcenter:// 链接
        # 路由到本 App。原工程仅在 WidgetConstants.swift 定义了 urlScheme 常量，
        # 但 Info.plist 未声明 CFBundleURLTypes，导致从 Widget / 外部应用
        # 点击 agentcontrolcenter://open-session?sessionId=xxx 时系统不会唤起本 App。
        CFBundleURLTypes:
          - CFBundleURLName: com.agentcontrolcenter.app.ios
            CFBundleURLSchemes:
              - agentcontrolcenter
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentcontrolcenter.app.ios
        PRODUCT_NAME: AgentControlCenter
        # C1: 与 version.properties (4.7.0 / code 40) 单一事实来源对齐。
        MARKETING_VERSION: "4.7.0"
        CURRENT_PROJECT_VERSION: "40"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        # App Entitlements：声明 App Group / Keychain Sharing 等能力，
        # 缺失会导致 UserDefaults(suiteName:) 返回 nil，Widget 数据流断裂
        CODE_SIGN_ENTITLEMENTS: AgentControlCenter/AgentControlCenter.entitlements

  AgentControlCenterWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: AgentControlCenter/Widget
        excludes:
          - AgentControlCenterWidgetExtension.entitlements
          - Info.plist
    # CI-fix: WidgetExtension 必须有显式 Info.plist 包含 NSExtension dict，
    # 否则 iOS Simulator 安装时报 "extensionDictionary must be set in placeholder
    # attributes for an app extension placeholder"。原配置用 GENERATE_INFOPLIST_FILE: YES
    # + INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier 期望生成嵌套 dict，
    # 但 Xcode 16.4 的 INFOPLIST_KEY_* 不会生成嵌套 NSExtension dict，导致
    # WidgetExtension.appex 安装失败、test runner 启动失败。
    info:
      path: AgentControlCenter/Widget/Info.plist
      properties:
        CFBundleDisplayName: AgentWidget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentcontrolcenter.app.ios.WidgetExtension
        PRODUCT_NAME: AgentControlCenterWidgetExtension
        # C1: 与 version.properties (4.7.0 / code 40) 单一事实来源对齐。
        MARKETING_VERSION: "4.7.0"
        CURRENT_PROJECT_VERSION: "40"
        SKIP_INSTALL: YES
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        CODE_SIGN_ENTITLEMENTS: AgentControlCenter/Widget/AgentControlCenterWidgetExtension.entitlements
        GENERATE_INFOPLIST_FILE: NO

  AgentControlCenterTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: AgentControlCenterTests
    dependencies:
      - target: AgentControlCenter
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentcontrolcenter.app.ios.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  AgentControlCenter:
    build:
      targets:
        AgentControlCenter: all
        AgentControlCenterWidgetExtension: all
        AgentControlCenterTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AgentControlCenterTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
