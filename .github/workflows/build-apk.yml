name: Build & Test

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    name: Assemble & Unit Test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Konan
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Decode release keystore
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        working-directory: android
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > agentcontrolcenter.keystore
            echo "Keystore decoded: $(ls -la agentcontrolcenter.keystore)"
          else
            echo "KEYSTORE_BASE64 not set — release build will use debug signing"
          fi

      - name: Assemble debug APK & run unit tests
        working-directory: android
        run: ./gradlew assembleDebug testDebugUnitTest --no-daemon

      - name: Build release APK & upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        working-directory: android
        run: |
          ./gradlew assembleRelease --no-daemon
          VERSION="${GITHUB_REF_NAME}"
          echo "Creating release ${VERSION}..."
          APK=$(find app/build/outputs/apk/release -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            # Try debug APK as fallback
            APK=$(find app/build/outputs/apk/debug -name "*.apk" 2>/dev/null | head -1)
          fi
          if [ -z "$APK" ]; then
            echo "No APK found!"
            find app/build/outputs -type f -name "*.apk" 2>/dev/null
            exit 1
          fi
          echo "Found APK: $APK"
          # If release already exists (e.g. created via API), upload APK to it;
          # otherwise create a new release with the APK.
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            echo "Release ${VERSION} already exists, uploading APK..."
            gh release upload "${VERSION}" "${APK}" --clobber
          else
            gh release create "${VERSION}" \
              --title "Agent Control Center ${VERSION}" \
              --notes "For release notes see [CHANGELOG](https://github.com/Hinana0325/Agent-Control-Center/blob/main/CHANGELOG.md)" \
              "${APK}"
          fi
