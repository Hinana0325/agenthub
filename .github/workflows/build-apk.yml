name: Build & Test

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    name: Assemble & Unit Test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Konan
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Assemble debug APK & run unit tests
        working-directory: android
        run: ./gradlew assembleDebug testDebugUnitTest --no-daemon

      - name: Build release APK & upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: android
        run: |
          ./gradlew assembleRelease --no-daemon
          VERSION="${GITHUB_REF_NAME}"
          echo "Creating release ${VERSION}..."
          APK=$(find app/build/outputs/apk/release -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            # Try debug APK as fallback
            APK=$(find app/build/outputs/apk/debug -name "*.apk" 2>/dev/null | head -1)
          fi
          if [ -z "$APK" ]; then
            echo "No APK found!"
            find app/build/outputs -type f -name "*.apk" 2>/dev/null
            exit 1
          fi
          echo "Found APK: $APK"
          gh release create "${VERSION}" \
            --title "AgentHub ${VERSION}" \
            --notes "For release notes see [CHANGELOG](https://github.com/Hinana0325/agenthub/blob/main/CHANGELOG.md)" \
            "${APK}"
