name: Build & Test

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # J3: Detekt 静态代码分析。
  # 阶段 1（当前）：continue-on-error = true，仅生成报告不阻断流水线，
  # 避免现有代码的存量违规阻塞 build / release。待清理完毕后改为 false 即可生效。
  detekt:
    name: Detekt
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Run Detekt
        working-directory: android
        run: ./gradlew detekt --no-daemon

      - name: Upload Detekt Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: android/app/build/reports/detekt/

  # J3: Android Lint 检查。
  # 阶段 1（当前）：continue-on-error = true，仅生成报告不阻断流水线，
  # 避免现有代码的 lint 存量问题阻塞 build / release。待清理完毕后改为 false 即可生效。
  lint:
    name: Lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Run Lint
        working-directory: android
        run: ./gradlew lintDebug --no-daemon

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: android/app/build/reports/lint-results-*.html

  build:
    name: Assemble & Unit Test
    runs-on: ubuntu-latest
    # J3: build 依赖 detekt / lint 完成。由于两者均设了 continue-on-error: true，
    # 即使检查发现违规也不会阻断 build 与 release 流程——报告会作为 artifact 上传供审查。
    needs: [detekt, lint]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        # D2: Gradle 9.0+ 最低要求 JDK 21 运行；AGP 9.3 + Gradle 9.6.1 配套。
        # JDK 17 会让 Gradle 9 直接启动失败（UnsupportedClassVersionError）。
        # 项目编译目标仍是 Java 17（compileOptions sourceCompatibility/targetCompatibility），
        # 这里 JDK 21 仅用于运行 Gradle 本身。
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Cache Gradle packages
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Konan
        uses: actions/cache@v6
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Decode release keystore
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        working-directory: android
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > agentcontrolcenter.keystore
            echo "Keystore decoded: $(ls -la agentcontrolcenter.keystore)"
          else
            echo "KEYSTORE_BASE64 not set — release build will use debug signing"
          fi

      - name: Assemble debug APK & run unit tests
        working-directory: android
        run: ./gradlew assembleDebug testDebugUnitTest --no-daemon

      - name: Build release APK & upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        working-directory: android
        run: |
          ./gradlew assembleRelease --no-daemon
          VERSION="${GITHUB_REF_NAME}"
          echo "Creating release ${VERSION}..."
          APK=$(find app/build/outputs/apk/release -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            # Try debug APK as fallback
            APK=$(find app/build/outputs/apk/debug -name "*.apk" 2>/dev/null | head -1)
          fi
          if [ -z "$APK" ]; then
            echo "No APK found!"
            find app/build/outputs -type f -name "*.apk" 2>/dev/null
            exit 1
          fi
          echo "Found APK: $APK"
          # If release already exists (e.g. created via API), upload APK to it;
          # otherwise create a new release with the APK.
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            echo "Release ${VERSION} already exists, uploading APK..."
            gh release upload "${VERSION}" "${APK}" --clobber
          else
            gh release create "${VERSION}" \
              --title "Agent Control Center ${VERSION}" \
              --notes "For release notes see [CHANGELOG](https://github.com/Hinana0325/Agent-Control-Center/blob/main/CHANGELOG.md)" \
              "${APK}"
          fi
