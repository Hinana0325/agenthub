name: Build & Test

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # J3: Detekt 静态代码分析。
  # detekt baseline 已存在（android/config/detekt-baseline.xml），存量违规由 baseline 接受、增量违规才失败。
  detekt:
    name: Detekt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Run Detekt
        working-directory: android
        run: ./gradlew detekt --no-daemon

      - name: Upload Detekt Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: android/app/build/reports/detekt/

  # J3: Android Lint 检查。
  # lint 的翻译类错误通过 android/app/build.gradle 的 abortOnError false 处理（已在 android 侧）。
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Run Lint
        working-directory: android
        run: ./gradlew lintDebug --no-daemon

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: android/app/build/reports/lint-results-*.html

  build:
    name: Assemble & Unit Test
    runs-on: ubuntu-latest
    # J3: build 依赖 detekt / lint 完成。存量违规由 detekt baseline 接受，
    # lint 翻译类错误由 abortOnError false 处理——报告作为 artifact 上传供审查。
    needs: [detekt, lint]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        # D2: Gradle 9.0+ 最低要求 JDK 21 运行；AGP 9.3 + Gradle 9.6.1 配套。
        # JDK 17 会让 Gradle 9 直接启动失败（UnsupportedClassVersionError）。
        # 项目编译目标仍是 Java 17（compileOptions sourceCompatibility/targetCompatibility），
        # 这里 JDK 21 仅用于运行 Gradle 本身。
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Decode release keystore
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        working-directory: android
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > agentcontrolcenter.keystore
            echo "Keystore decoded: $(ls -la agentcontrolcenter.keystore)"
          else
            echo "KEYSTORE_BASE64 not set — release build will use debug signing"
          fi

      - name: Assemble debug APK & run unit tests
        working-directory: android
        run: ./gradlew assembleDebug testDebugUnitTest --no-daemon

      - name: Build release APK
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload release APK artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download release APK artifact
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: apk

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "Publishing release ${VERSION}..."
          APK=$(find apk -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "No APK found in artifact!"
            find apk -type f 2>/dev/null
            exit 1
          fi
          echo "Found APK: $APK"
          APK_NAME=$(basename "${APK}")
          # If release already exists, upload asset only if not already present;
          # otherwise create a new release with the APK.
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            echo "Release ${VERSION} already exists."
            if gh release view "${VERSION}" --json assets -q ".assets[].name" 2>/dev/null | grep -qx "${APK_NAME}"; then
              echo "Asset ${APK_NAME} already exists on release ${VERSION}, skipping upload."
            else
              echo "Uploading ${APK_NAME} to existing release ${VERSION}..."
              gh release upload "${VERSION}" "${APK}"
            fi
          else
            gh release create "${VERSION}" \
              --title "Agent Control Center ${VERSION}" \
              --notes "For release notes see [CHANGELOG](https://github.com/Hinana0325/Agent-Control-Center/blob/main/CHANGELOG.md)" \
              "${APK}"
          fi
